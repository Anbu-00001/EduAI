name: EduPredict AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: edupredict_test
          POSTGRES_USER: edupredict
          POSTGRES_PASSWORD: edupredict
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://edupredict:edupredict@localhost:5432/edupredict_test
          JWT_SECRET: ci_test_secret_minimum_32_chars_long
          DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py \
            -x
      
      - name: Verify model artifacts exist
        run: |
          python -c "
          import json, os
          path = 'model/artifacts/metrics.json'
          if not os.path.exists(path):
              print('Metrics file missing - skipping check (first run?)')
              exit(0)
          m = json.load(open(path))
          assert m['graph_regularised_auc'] >= 0.78, f'AUC too low: {m[\"graph_regularised_auc\"]}'
          assert m['post_calibration_ece'] < 0.08, f'ECE too high: {m[\"post_calibration_ece\"]}'
          print('All artifact checks passed')
          "
      
      - name: Build Docker image
        run: docker build -t edupredict-ai:${{ github.sha }} .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service edupredict-api
