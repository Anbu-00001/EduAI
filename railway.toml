# DEPRECATED — project has migrated to Render + Vercel + Neon + Upstash
# This file is kept for reference only. Do not use for new deployments.
# See render.yaml and app/ui/vercel.json for current deployment config.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.api.main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
